# AGI-HPC Memory Stack
# Docker Compose for memory services
# Usage: docker-compose -f infra/local/docker-compose.memory.yaml up

version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - memory-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=agi
      - POSTGRES_PASSWORD=agi_dev
      - POSTGRES_DB=episodic_memory
    networks:
      - memory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agi"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - memory-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  semantic-memory:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.mock
    ports:
      - "50053:50053"
    environment:
      - MOCK_SERVICE=semantic_memory
      - MOCK_PORT=50053
      - AGI_QDRANT_ADDR=qdrant:6334
      - PYTHONUNBUFFERED=1
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - memory-network

  episodic-memory:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.mock
    ports:
      - "50052:50052"
    environment:
      - MOCK_SERVICE=episodic_memory
      - MOCK_PORT=50052
      - AGI_POSTGRES_DSN=postgresql://agi:agi_dev@postgres:5432/episodic_memory
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memory-network

  procedural-memory:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile.mock
    ports:
      - "50054:50054"
    environment:
      - MOCK_SERVICE=procedural_memory
      - MOCK_PORT=50054
      - AGI_REDIS_ADDR=redis:6379
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - memory-network

volumes:
  qdrant_data:
  postgres_data:
  redis_data:

networks:
  memory-network:
    driver: bridge
