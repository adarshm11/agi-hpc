<!DOCTYPE html>
<html>
<head>
<title>Atlas AI - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e17;color:#e0e6f0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#131a2b;border:1px solid #2a3555;border-radius:16px;padding:40px;text-align:center;max-width:400px;width:90%}
h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#4a9eff,#7cc4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#7a8ba8;margin-bottom:32px;font-size:14px}
.logo{margin-bottom:20px}
.logo svg{width:64px;height:64px}
form{margin:0}
button{display:block;width:100%;padding:14px 24px;border-radius:10px;font-size:15px;font-weight:600;margin:10px 0;cursor:pointer;transition:all .2s;border:1px solid #ccc;background:white;color:#333}
button:hover{background:#f1f1f1}
.foot{margin-top:24px;font-size:11px;color:#7a8ba8;opacity:.6}
</style>
</head>
<body>
<div class="card">
<div class="logo">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.9"/><stop offset="100%" style="stop-color:#1a4a8a;stop-opacity:0.9"/></linearGradient></defs>
<circle cx="50" cy="50" r="44" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.8"/>
<circle cx="50" cy="20" r="4" fill="#4a9eff"/><circle cx="25" cy="40" r="4" fill="#4a9eff"/>
<circle cx="75" cy="40" r="4" fill="#4a9eff"/><circle cx="35" cy="65" r="4" fill="#4a9eff"/>
<circle cx="65" cy="65" r="4" fill="#4a9eff"/><circle cx="50" cy="50" r="6" fill="#7cc4ff"/>
<line x1="50" y1="20" x2="50" y2="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
<line x1="25" y1="40" x2="50" y2="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
<line x1="75" y1="40" x2="50" y2="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
<line x1="35" y1="65" x2="50" y2="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
<line x1="65" y1="65" x2="50" y2="50" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
<ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.3" transform="rotate(-25 50 50)"/>
</svg>
</div>
<h1>Atlas AI</h1>
<p class="sub">Local AI Research Assistant<br>Sign in to continue</p>
<form method="GET" action="/oauth2/start">
<input type="hidden" name="rd" value="/">
<button type="submit"><svg style="vertical-align:middle;margin-right:8px" width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Sign in with Google</button>
</form>
<div class="foot">Bel Marin Keys, Novato &#8226; Qwen-72B &#8226; 2x GV100</div>
</div>
</body>
</html>
