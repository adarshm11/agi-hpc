# AGI-HPC LLM Service Production Configuration
# Sprint 6 - Production Deployment
#
# Usage:
#   kubectl apply -f production.yaml
#
# Prerequisites:
#   - Kubernetes cluster with agi-hpc namespace
#   - ANTHROPIC_API_KEY and OPENAI_API_KEY set as env vars or in a vault

apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-service-config
  namespace: agi-hpc
  labels:
    app: agi-hpc
    component: llm-service
    sprint: "6"
data:
  LLM_PROVIDER: "anthropic"
  LLM_MODEL: "claude-3-5-sonnet-20241022"
  LLM_TEMPERATURE: "0.3"
  LLM_MAX_TOKENS: "4096"
  LLM_TIMEOUT_SEC: "30"
  LLM_MAX_RETRIES: "3"
  LLM_RATE_LIMIT_RPM: "60"
  LLM_CACHE_ENABLED: "true"
  LLM_CACHE_TTL_SEC: "3600"
  LLM_FALLBACK_PROVIDER: "ollama"
  LLM_FALLBACK_MODEL: "llama3"
  LLM_FALLBACK_BASE_URL: "http://ollama-service:11434"
  EMBEDDING_PROVIDER: "openai"
  EMBEDDING_MODEL: "text-embedding-3-small"
  LOG_LEVEL: "INFO"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-service-secrets
  namespace: agi-hpc
  labels:
    app: agi-hpc
    component: llm-service
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
