<!DOCTYPE html>
<html><body style="margin:0;padding:0;background:#1a1a2e">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4575b4"/>
      <stop offset="100%" stop-color="#313695"/>
    </linearGradient>
    <linearGradient id="bD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f46d43"/>
      <stop offset="100%" stop-color="#d73027"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gl2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="155" y1="520" x2="1060" y2="520"/>
    <line x1="155" y1="450" x2="1060" y2="450"/>
    <line x1="155" y1="380" x2="1060" y2="380"/>
    <line x1="155" y1="310" x2="1060" y2="310"/>
    <line x1="155" y1="240" x2="1060" y2="240"/>
    <line x1="155" y1="170" x2="1060" y2="170"/>
  </g>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#7799aa" font-family="system-ui,sans-serif" font-size="14" font-weight="300" letter-spacing="5">MORAL GEOMETRY BENCHMARK</text>
  <text x="600" y="84" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Framing Shifts LLM Harm Perception at 7.6&#x3C3;</text>
  <text x="600" y="112" text-anchor="middle" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="13" font-weight="400">Fisher combination of paired t-tests across 4 Gemini models | Cross-family validated on Claude Sonnet</text>

  <!-- Y-axis: 0&#x3C3; at y=520, each &#x3C3; = 70px. Max ~5.8&#x3C3; -->
  <g fill="#7799aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">
    <text x="148" y="524">0&#x3C3;</text>
    <text x="148" y="454">1&#x3C3;</text>
    <text x="148" y="384">2&#x3C3;</text>
    <text x="148" y="314">3&#x3C3;</text>
    <text x="148" y="244">4&#x3C3;</text>
    <text x="148" y="174">5&#x3C3;</text>
  </g>

  <!-- Threshold lines -->
  <line x1="155" y1="380" x2="1060" y2="380" stroke="#fee090" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="1068" y="384" fill="#fee090" font-family="system-ui,sans-serif" font-size="9" opacity="0.6">p&lt;0.05</text>

  <line x1="155" y1="310" x2="1060" y2="310" stroke="#fdae61" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="1068" y="314" fill="#fdae61" font-family="system-ui,sans-serif" font-size="9" opacity="0.6">3&#x3C3;</text>

  <line x1="155" y1="170" x2="1060" y2="170" stroke="#d73027" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="1068" y="174" fill="#d73027" font-family="system-ui,sans-serif" font-size="9" font-weight="600" opacity="0.7">5&#x3C3; discovery</text>

  <!-- Baseline -->
  <line x1="155" y1="520" x2="1060" y2="520" stroke="#445566" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- MODEL BARS: bar_w=32, gap=4, pair_w=68, model spacing=160   -->
  <!-- y = 520 - sigma*70                                           -->
  <!-- ============================================================ -->

  <!-- M1: gemini-2.0-flash  e=2.9&#x3C3; d=4.2&#x3C3; -->
  <!-- e: y=520-203=317 h=203 | d: y=520-294=226 h=294 -->
  <rect x="210" y="317" width="32" height="203" rx="3" fill="url(#bE)" opacity="0.9"/>
  <rect x="246" y="226" width="32" height="294" rx="3" fill="url(#bD)" opacity="0.9"/>
  <text x="226" y="309" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2.9</text>
  <text x="262" y="218" fill="#fdae61" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4.2</text>
  <text x="244" y="548" text-anchor="middle" fill="#8899aa" font-family="system-ui,sans-serif" font-size="11">2.0-flash</text>

  <!-- M2: gemini-2.5-pro  e=4.1&#x3C3; d=3.1&#x3C3; -->
  <!-- e: y=520-287=233 h=287 | d: y=520-217=303 h=217 -->
  <rect x="370" y="233" width="32" height="287" rx="3" fill="url(#bE)" opacity="0.9"/>
  <rect x="406" y="303" width="32" height="217" rx="3" fill="url(#bD)" opacity="0.9"/>
  <text x="386" y="225" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4.1</text>
  <text x="422" y="295" fill="#fdae61" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">3.1</text>
  <text x="404" y="548" text-anchor="middle" fill="#8899aa" font-family="system-ui,sans-serif" font-size="11">2.5-pro</text>

  <!-- M3: gemini-2.5-flash  e=1.7&#x3C3; d=2.7&#x3C3; -->
  <!-- e: y=520-119=401 h=119 | d: y=520-189=331 h=189 -->
  <rect x="530" y="401" width="32" height="119" rx="3" fill="url(#bE)" opacity="0.9"/>
  <rect x="566" y="331" width="32" height="189" rx="3" fill="url(#bD)" opacity="0.9"/>
  <text x="546" y="393" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">1.7</text>
  <text x="582" y="323" fill="#fdae61" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2.7</text>
  <text x="564" y="548" text-anchor="middle" fill="#8899aa" font-family="system-ui,sans-serif" font-size="11">2.5-flash</text>

  <!-- M4: gemini-3-flash  e=2.0&#x3C3; d=2.5&#x3C3; -->
  <!-- e: y=520-140=380 h=140 | d: y=520-175=345 h=175 -->
  <rect x="690" y="380" width="32" height="140" rx="3" fill="url(#bE)" opacity="0.9"/>
  <rect x="726" y="345" width="32" height="175" rx="3" fill="url(#bD)" opacity="0.9"/>
  <text x="706" y="372" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2.0</text>
  <text x="742" y="337" fill="#fdae61" font-family="system-ui,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2.5</text>
  <text x="724" y="548" text-anchor="middle" fill="#8899aa" font-family="system-ui,sans-serif" font-size="11">3-flash</text>

  <!-- Separator -->
  <line x1="820" y1="145" x2="820" y2="535" stroke="#445566" stroke-width="1" stroke-dasharray="3,3" opacity="0.35"/>
  <text x="820" y="140" text-anchor="middle" fill="#556677" font-family="system-ui,sans-serif" font-size="9">FISHER</text>

  <!-- COMBINED: e=5.1&#x3C3; d=5.8&#x3C3; -->
  <!-- e: y=520-357=163 h=357 | d: y=520-406=114 h=406 -->
  <rect x="870" y="163" width="38" height="357" rx="4" fill="url(#bE)" opacity="1.0" filter="url(#gl)"/>
  <rect x="914" y="114" width="38" height="406" rx="4" fill="url(#bD)" opacity="1.0" filter="url(#gl)"/>
  <text x="889" y="153" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="16" font-weight="800" text-anchor="middle">5.1</text>
  <text x="933" y="104" fill="#fdae61" font-family="system-ui,sans-serif" font-size="16" font-weight="800" text-anchor="middle">5.8</text>
  <text x="911" y="548" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Combined</text>

  <!-- 7.6 sigma callout -->
  <rect x="985" y="105" width="72" height="56" rx="10" fill="#d73027" opacity="0.12"/>
  <rect x="985" y="105" width="72" height="56" rx="10" fill="none" stroke="#d73027" stroke-width="2" opacity="0.5"/>
  <text x="1021" y="134" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="26" font-weight="800" filter="url(#gl2)">7.6&#x3C3;</text>
  <text x="1021" y="152" text-anchor="middle" fill="#f46d43" font-family="system-ui,sans-serif" font-size="10" font-weight="700">ALL T5</text>

  <!-- Legend -->
  <rect x="200" y="590" width="14" height="14" rx="3" fill="url(#bE)"/>
  <text x="220" y="602" fill="#abd9e9" font-family="system-ui,sans-serif" font-size="12">Euphemistic (softens tone, reduces perceived harm)</text>
  <rect x="560" y="590" width="14" height="14" rx="3" fill="url(#bD)"/>
  <text x="580" y="602" fill="#fdae61" font-family="system-ui,sans-serif" font-size="12">Dramatic (sharpens tone, increases perceived harm)</text>

  <!-- Footer -->
  <text x="600" y="640" text-anchor="middle" fill="#556677" font-family="system-ui,sans-serif" font-size="11">Social Cognition Track | Measuring Progress Toward AGI | Bond (2026), Geometric Ethics</text>
  <text x="600" y="658" text-anchor="middle" fill="#445566" font-family="system-ui,sans-serif" font-size="10">Paired t-tests vs empirical stochastic controls | Regularized incomplete beta t&#x2192;p | Wilson-Hilferty Fisher combination</text>
</svg>

</body></html>
